services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: premiersoft-serasa-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: file:/data/app.db
      STABILIZATION_WINDOW_MS: 3000
      STABILIZATION_MIN_READINGS: 20
      STABILIZATION_TOLERANCE_KG: 30
      PRESENCE_EXPIRATION_MS: 10000
    ports:
      - "3333:3333"
    volumes:
      - scale-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  scale-data:
